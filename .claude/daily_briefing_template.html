<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"></head>
<body style="margin:0;padding:0;background-color:#F4F6F9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#F4F6F9;padding:32px 16px;">
<tr><td align="center">
<table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">

  <!-- HEADER
       IMPORTANT: background-color solid fallback MUST come before background gradient.
       Gmail strips CSS gradients; without the solid fallback the white title text
       becomes invisible against a white/transparent background. -->
  <tr><td style="background-color:#1B2A4A;background:linear-gradient(135deg,#1B2A4A 0%,#2D4A8A 100%);border-radius:12px 12px 0 0;padding:32px 36px 28px;">
    <p style="margin:0 0 6px;color:#A8BFDD;font-size:13px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;">Daily Briefing</p>
    <h1 style="margin:0;color:#FFFFFF;font-size:26px;font-weight:700;">{{GREETING}}</h1>
    <p style="margin:8px 0 0;color:#A8BFDD;font-size:14px;">{{DATE_LINE}}</p>
  </td></tr>

  <!-- ACCENT STRIPE
       Three solid-colour cells instead of a single gradient td — Gmail-safe. -->
  <tr>
    <td width="200" height="4" style="background-color:#4A90D9;height:4px;line-height:4px;font-size:0;">&nbsp;</td>
    <td width="200" height="4" style="background-color:#7B5EA7;height:4px;line-height:4px;font-size:0;">&nbsp;</td>
    <td width="200" height="4" style="background-color:#E8734A;height:4px;line-height:4px;font-size:0;">&nbsp;</td>
  </tr>

  <!-- BODY CARD — replace {{BODY_CONTENT}} with the briefing sections -->
  <tr><td style="background:#FFFFFF;border-radius:0 0 12px 12px;padding:32px 36px;">

    {{BODY_CONTENT}}

  </td></tr>

  <!-- FOOTER -->
  <tr><td style="padding:20px 36px;text-align:center;">
    <p style="margin:0;font-size:12px;color:#94A3B8;">Generated by Claude Code &nbsp;·&nbsp; pradeep@projecttech4dev.org</p>
  </td></tr>

</table>
</td></tr>
</table>
</body>
</html>
