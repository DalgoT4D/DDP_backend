name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        type: string
      confirm:
        description: 'Type the branch name again to confirm'
        required: true
        type: string

concurrency:
  group: manual-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Verify confirmation
        if: inputs.branch != inputs.confirm
        run: |
          echo "::error::Confirmation does not match. You typed '${{ inputs.confirm }}' but branch is '${{ inputs.branch }}'."
          exit 1

      - name: Deploy branch to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVERIP }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 500s
          script: |
            set -e
            source ~/.nvm/nvm.sh
            cd /home/ddp/DDP_backend
            git fetch origin
            git checkout ${{ inputs.branch }}
            git pull origin ${{ inputs.branch }}
            /home/ddp/.local/bin/uv sync
            /home/ddp/.local/bin/uv run python manage.py migrate
            /home/ddp/.local/bin/uv run python manage.py loaddata seed/*.json
            /home/ddp/.yarn/bin/pm2 restart ddp_backend-asgi

      - name: Summary
        run: |
          echo "## Manual Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ inputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
